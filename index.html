<!DOCTYPE html>
<html lang="en-us">
<head>
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | SkybullBaseTemplate</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
            background: black;
        }

        #unity-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #unity-canvas {
            display: block;
            background: url("/TemplateData/Background.png") center center / cover no-repeat;
        }

        #unity-loading-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 360px;
            display: none;
            flex-direction: column-reverse;
            align-items: bottom;
            gap: 6px;
            z-index: 999;
        }

        #unity-progress-bar-empty {
            width: 100% !important;
            height: 8px !important;
            background: rgba(255, 255, 255, 0.15) !important;
            border-radius: 999px !important;
            overflow: hidden !important;
            margin: 0 !important;
        }

        #unity-progress-bar-full {
            width: 0%;
            height: 100% !important;
            background: linear-gradient(90deg, #a78bfa, #60a5fa) !important;
            border-radius: 999px !important;
            transition: width 0.2s ease;
            margin: 0 !important;
        }

        #unity-load-text {
            color: rgba(255, 255, 255, 0.75);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.04em;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas" width="1080" height="1920" tabindex="1">
            
        </canvas>
        <div id="unity-loading-bar">
            <div id="unity-load-text">Loading... 0%</div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
    </div>

    <script>
        // Telegram WebApp
        if (window.Telegram && Telegram.WebApp) {
            Telegram.WebApp.ready();
            try { Telegram.WebApp.expand(); } catch (e) { }
        }

        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var fullscreenButton = document.querySelector("#unity-fullscreen-button");
        var warningBanner = document.querySelector("#unity-warning");
        var Gameinstance = null;

        function unityShowBanner(msg, type) {
            function updateBannerVisibility() {
                if (!warningBanner) return;
                warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
            }
            if (!warningBanner) return; // bám sát target: không tạo thêm DOM mới
            var div = document.createElement('div');
            div.innerHTML = msg;
            warningBanner.appendChild(div);
            if (type == 'error') div.style = 'background: red; padding: 10px;';
            else {
                if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
                setTimeout(function () {
                    try { warningBanner.removeChild(div); } catch (e) { }
                    updateBannerVisibility();
                }, 5000);
            }
            updateBannerVisibility();
        }

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/DD.loader.js";
        var config = {
            arguments: [],
            dataUrl: buildUrl + "/DD.data.unityweb",
            frameworkUrl: buildUrl + "/DD.framework.js.unityweb",
            codeUrl: buildUrl + "/DD.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "Skybull Studio",
            productName: "Danger Dungeon Dungeon Master",
            productVersion: "0.0.3",
            showBanner: unityShowBanner,
            // errorHandler: function(err, url, line) {
            //    alert("error " + err + " occurred at line " + line);
            //    // Return 'true' if you handled this error and don't want Unity
            //    // to process it further, 'false' otherwise.
            //    return true;
            // },
        };

        function maintainAspectRatio() {
            const containerWidth = window.innerWidth;
            const containerHeight = window.innerHeight;
            const targetAspectRatio = 9 / 16;
            const containerAspectRatio = containerWidth / containerHeight;

            let newWidth, newHeight;

            if (containerAspectRatio > targetAspectRatio) {
                newHeight = containerHeight;
                newWidth = newHeight * targetAspectRatio;
            } else {
                newWidth = containerWidth;
                newHeight = newWidth / targetAspectRatio;
            }

            canvas.style.width = newWidth + "px";
            canvas.style.height = newHeight + "px";
        }

        window.addEventListener("resize", maintainAspectRatio);
        window.addEventListener("load", maintainAspectRatio);

        document.querySelector("#unity-loading-bar").style.display = "flex";

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.getElementsByTagName('head')[0].appendChild(meta);
            container.className = "unity-mobile";
            canvas.className = "unity-mobile";
            // config.devicePixelRatio = 1; // giữ nguyên như target (comment)
        }

        var loadText = document.querySelector("#unity-load-text");

        // --- Download Interceptor (XHR + fetch) ---
        var _dlLoaded = 0;
        var _dlTotal = 0;
        var _dlStartTime = null;
        var _dlRequestMap = {};
        var _dlCounter = 0;

        var _dlDone = false;

        function _dlCheckDone() {
            if (!_dlDone && _dlTotal > 0 && _dlLoaded >= _dlTotal) {
                _dlDone = true;
                if (loadText) loadText.textContent = 'Extracting data...';
            }
        }

        function _dlUpdateText() {
            if (_dlDone) return;
            var elapsed = (Date.now() - _dlStartTime) / 1000;
            var speedKBs = elapsed > 0 ? (_dlLoaded / 1024 / elapsed) : 0;
            var loadedMB = (_dlLoaded / 1048576).toFixed(1);
            var totalMB  = (_dlTotal  / 1048576).toFixed(1);
            var speedStr = speedKBs >= 1024
                ? (speedKBs / 1024).toFixed(2) + ' MB/s'
                : Math.round(speedKBs) + ' KB/s';
            
            if (loadText) {
                loadText.textContent = 'Loading resources... ' + loadedMB + 'MB/' + totalMB + 'MB - ' + speedStr;
            }
            _dlCheckDone();
        }

        console.log('[DL] interceptor installed.');

        // --- Patch XHR ---
        (function () {
            var origOpen = XMLHttpRequest.prototype.open;
            var origSend = XMLHttpRequest.prototype.send;
            XMLHttpRequest.prototype.open = function (method, url) {
                this._dlId = ++_dlCounter;
                return origOpen.apply(this, arguments);
            };
            XMLHttpRequest.prototype.send = function () {
                var xhr = this;
                xhr.addEventListener('progress', function (e) {
                    if (!e.lengthComputable) return;
                    if (!_dlStartTime) _dlStartTime = Date.now();
                    var id = xhr._dlId;
                    if (!_dlRequestMap[id]) { _dlRequestMap[id] = { loaded: 0 }; _dlTotal += e.total; }
                    _dlLoaded += (e.loaded - _dlRequestMap[id].loaded);
                    _dlRequestMap[id].loaded = e.loaded;
                    _dlUpdateText();
                });
                return origSend.apply(this, arguments);
            };
        })();

        // --- Patch fetch ---
        (function () {
            var origFetch = window.fetch;
            window.fetch = function (input, init) {
                var url = (typeof input === 'string') ? input : (input && input.url) || '';
                return origFetch.apply(this, arguments).then(function (response) {
                    var contentLength = response.headers.get('content-length');
                    var total = contentLength ? parseInt(contentLength, 10) : 0;
                    if (!total) return response; 
                    if (!_dlStartTime) _dlStartTime = Date.now();
                    _dlTotal += total;
                    var id = ++_dlCounter;
                    _dlRequestMap[id] = { loaded: 0 };
                    var reader = response.body.getReader();
                    var stream = new ReadableStream({
                        start: function (controller) {
                            function pump() {
                                return reader.read().then(function (result) {
                                    if (result.done) { controller.close(); return; }
                                    var chunk = result.value;
                                    _dlLoaded += chunk.byteLength;
                                    _dlRequestMap[id].loaded += chunk.byteLength;
                                    _dlUpdateText();
                                    controller.enqueue(chunk);
                                    return pump();
                                });
                            }
                            return pump();
                        }
                    });
                    return new Response(stream, {
                        headers: response.headers,
                        status: response.status,
                        statusText: response.statusText
                    });
                });
            };
        })();


        // ------------------------------------------

        var script = document.createElement("script");
        script.src = loaderUrl;

        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = (100 * progress) + "%";
                // Nếu file tải xong nhưng interceptor không bắt được (server không trả Content-Length)
                // thì dùng progress >= 0.9 để chuyển sang trạng thái giải nén
                if (!_dlDone && progress >= 0.9) {
                    _dlDone = true;
                    if (loadText) loadText.textContent = 'Extracting data...';
                }
            }).then((unityInstance) => {
                loadingBar.style.display = "none";
                Gameinstance = unityInstance;
                window.unityInstance = unityInstance;
            }).catch((message) => {
                alert(message);
            });
        };
        document.body.appendChild(script);


    </script>

    <script>
        (function () {
            function patch(el) {
                if (!el || el.dataset._oskPatched === "1") return;
                el.dataset._oskPatched = "1";

                el.removeAttribute("readonly");
                el.removeAttribute("disabled");
                el.setAttribute("inputmode", "none");
                el.setAttribute("autocomplete", "off");
                el.setAttribute("autocapitalize", "off");
                el.setAttribute("autocorrect", "off");
                el.setAttribute("spellcheck", "false");

                el.style.opacity = 0;
                el.style.position = "fixed";
                el.style.top = "-10000px";
                el.style.left = "-10000px";
                el.style.width = "1px";
                el.style.height = "1px";
            }

            Array.prototype.forEach.call(document.querySelectorAll("input,textarea"), patch);

            const mo = new MutationObserver(muts => {
                for (const m of muts) {
                    for (const n of m.addedNodes) {
                        if (n && (n.tagName === "INPUT" || n.tagName === "TEXTAREA")) patch(n);
                        if (n && n.querySelectorAll) {
                            n.querySelectorAll("input,textarea").forEach(patch);
                        }
                    }
                }
            });
            mo.observe(document.documentElement, { childList: true, subtree: true });
        })();
    </script>

    <script type="text/javascript">
        document.addEventListener("DOMContentLoaded", function () {
            if (window.Telegram && Telegram.WebApp) {
                try {
                    Telegram.WebApp.ready();
                    Telegram.WebApp.enableClosingConfirmation();
                } catch (e) { }
            }
        });
    </script>
</body>
</html>
